<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rums Cove Render Basics v2</title>
  <style>
    :root{color-scheme:dark;font-family:Arial,Helvetica,sans-serif;background:#151515;color:#f4e9bd}
    body{margin:0;padding:24px;background:#151515}.box{border:1px solid #8f7f44;background:#211f16;padding:12px 14px;margin:0 0 14px;max-width:1180px}
    h1{margin:0 0 8px;font-size:26px}p{margin:0 0 14px;color:#d2c48b;max-width:1180px}code{color:#fff2a8}
    .controls{display:flex;gap:14px;flex-wrap:wrap}.controls label{font:12px Consolas,monospace}
    .wrap{display:inline-block;border:2px solid #8f7f44;background:#0d0d0d;padding:12px;max-width:calc(100vw - 72px);overflow:auto}
    #stage{position:relative;width:614px;height:366px;background:#63c7ee;overflow:hidden}.layer{position:absolute;left:0;top:0;transform-origin:0 0;max-width:none;pointer-events:none}.comparison{position:absolute;left:0;top:0;width:614px;height:366px;opacity:.24;z-index:9000;display:none;pointer-events:none}
    .hud{position:absolute;left:8px;top:8px;z-index:9999;background:rgba(0,0,0,.68);padding:7px;font:11px Consolas,monospace}.legend{font:12px Consolas,monospace;white-space:pre-wrap;overflow-wrap:anywhere}.ok{color:#9fd36b}.fail{color:#ff8e8e}.warn{color:#ffd36b}
  </style>
</head>
<body>
  <h1>Rums Cove Render Basics v2</h1>
  <p>Standalone room rendering only. This page uses the generated XML scene JSON plus the render-basics layer plan. No weevil, no walking, no slime shell.</p>
  <div class="box"><strong>Run first:</strong><br><code>node scripts/build-rums-cove-xml-scene-json.mjs .\xml\RumsAirport_dynamAds_videoPodv2.xml</code></div>
  <div id="status" class="box">Loading...</div>
  <div class="box controls">
    <label><input id="comparisonToggle" type="checkbox"> comparison frame</label>
    <label><input data-group="environment" type="checkbox" checked> environment/backdrop</label>
    <label><input data-group="floor" type="checkbox" checked> floor/click shape</label>
    <label><input data-group="base" type="checkbox" checked> buildings/base</label>
    <label><input data-group="overlay" type="checkbox" checked> pod/remote overlay</label>
    <label><input data-group="doors" type="checkbox" checked> doors/arrows</label>
  </div>
  <div class="wrap"><div id="stage"><img id="comparison" class="comparison" src="/reference/rooms/RumsAirport_dynamAds_videoPodv2_release/RumsAirport_dynamAds_videoPodv2_release/frames/1.png" alt="comparison"><div id="hud" class="hud">loading</div></div></div>
  <div id="legend" class="box legend"></div>
<script type="module">
import { RUMS_COVE_RENDER_BASICS_LAYER_PLAN } from '/src/rooms/RumsCoveRenderBasicsLayerPlan.js';

const exportRoot = '/reference/rooms/RumsAirport_dynamAds_videoPodv2_release/RumsAirport_dynamAds_videoPodv2_release/';
const sceneJson = '/generated/rums-cove-xml-scene.json';
const stage = document.getElementById('stage');
const status = document.getElementById('status');
const hud = document.getElementById('hud');
const legend = document.getElementById('legend');
const comparison = document.getElementById('comparison');
const comparisonToggle = document.getElementById('comparisonToggle');
const groupInputs = [...document.querySelectorAll('input[data-group]')];
const layers = [];
let loaded = 0;
let failed = 0;

comparisonToggle.addEventListener('change', applyVisibility);
groupInputs.forEach(input => input.addEventListener('change', applyVisibility));

try {
  const res = await fetch(sceneJson + '?cacheBust=' + Date.now());
  if (!res.ok) throw new Error('missing generated JSON; rebuild rums-cove-xml-scene.json');
  const scene = await res.json();
  build(scene.placements || []);
  applyVisibility();
  status.innerHTML = '<span class="ok">Loaded render-basics v2.</span><br>Using source-backed XML placements and numeric shape SVGs.';
} catch (error) {
  status.innerHTML = '<span class="fail">Failed.</span><br><code>' + String(error.message || error) + '</code>';
}

function build(placements) {
  for (const item of RUMS_COVE_RENDER_BASICS_LAYER_PLAN) {
    const placement = findPlacement(item, placements);
    if (!placement) {
      layers.push({ item, placement: null, image: null, status: 'missing-placement' });
      continue;
    }
    const img = new Image();
    img.className = 'layer';
    img.alt = item.key;
    img.title = `${item.key} depth=${placement.depth} cid=${placement.characterId}`;
    img.dataset.group = item.group;
    img.style.zIndex = String(placement.depth);
    img.style.transform = cssMatrix(placement.matrix);
    img.addEventListener('load', () => { loaded += 1; updateHud(); });
    img.addEventListener('error', () => { failed += 1; updateHud(); });
    img.src = exportRoot + item.path + '?cacheBust=' + Date.now();
    stage.appendChild(img);
    layers.push({ item, placement, image: img, status: 'mapped' });
  }
  updateLegend();
}

function findPlacement(item, placements) {
  return placements.find(p => {
    if (item.name && p.name !== item.name) return false;
    if (item.characterId && p.characterId !== item.characterId) return false;
    return true;
  }) || placements.find(p => item.characterId && p.characterId === item.characterId) || null;
}

function applyVisibility() {
  comparison.style.display = comparisonToggle.checked ? 'block' : 'none';
  const enabled = new Set(groupInputs.filter(i => i.checked).map(i => i.dataset.group));
  for (const layer of layers) {
    if (!layer.image) continue;
    layer.image.style.display = enabled.has(layer.item.group) ? 'block' : 'none';
  }
  updateHud();
}

function updateHud() {
  const visible = layers.filter(l => l.image && l.image.style.display !== 'none').length;
  hud.innerHTML = ['Rums render basics v2', 'mapped: ' + layers.filter(l => l.status === 'mapped').length, 'visible: ' + visible, 'loaded: ' + loaded, 'failed: ' + failed].join('<br>');
}

function updateLegend() {
  const lines = ['Layer plan:'];
  for (const layer of layers) {
    const p = layer.placement;
    lines.push(p ? `${layer.item.key}: depth=${p.depth} cid=${p.characterId} group=${layer.item.group} path=${layer.item.path}` : `${layer.item.key}: missing placement`);
  }
  lines.push('', 'This is the checkpoint page for room rendering. Do not continue to walking/slime shell until this looks right.');
  legend.textContent = lines.join('\n');
}

function cssMatrix(m) {
  return `matrix(${m.scaleX}, ${m.rotateSkew0}, ${m.rotateSkew1}, ${m.scaleY}, ${m.x}, ${m.y})`;
}
</script>
</body>
</html>
