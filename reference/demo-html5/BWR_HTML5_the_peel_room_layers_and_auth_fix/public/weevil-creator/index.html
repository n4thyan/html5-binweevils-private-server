<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Design Your Weevil</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <style>
      @font-face {
        font-family: "Big Bloke BB";
        src: url("./assets/fonts/big_bloke_bb/BIGBB___.TTF") format("truetype");
        font-display: swap;
      }

      @font-face {
        font-family: "GosmickSans";
        src: url("./assets/fonts/gosmick_sans/GosmickSans.ttf") format("truetype");
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }

      @font-face {
        font-family: "GosmickSans";
        src: url("./assets/fonts/gosmick_sans/GosmickSansBold.ttf") format("truetype");
        font-weight: 700;
        font-style: normal;
        font-display: swap;
      }

      @font-face {
        font-family: "GosmickSans";
        src: url("./assets/fonts/gosmick_sans/GosmickSansOblique.ttf") format("truetype");
        font-weight: 400;
        font-style: italic;
        font-display: swap;
      }

      @font-face {
        font-family: "GosmickSans";
        src: url("./assets/fonts/gosmick_sans/GosmickSansBoldOblique.ttf") format("truetype");
        font-weight: 700;
        font-style: italic;
        font-display: swap;
      }

      :root {
        color-scheme: light;
        font-family: "GosmickSans", Arial, Helvetica, sans-serif;
        --bb-yellow-hi: #fff86a;
        --bb-yellow-mid: #fbed3a;
        --bb-yellow-lo: #ebd10b;
        --bb-outline: #9e6904;
        --bb-outline-deep: #7b4800;
        --bb-speckle-dark: rgba(82, 53, 0, 0.48);
        --bb-speckle-mid: rgba(140, 95, 0, 0.28);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        overflow: hidden;
        background: #177129;
      }

      #appShell {
        position: relative;
        width: min(96vw, 1200px);
        aspect-ratio: 600 / 404;
        overflow: hidden;
        background:
          radial-gradient(circle at 49% 37%, rgba(232, 220, 51, 0.88) 0%, rgba(182, 203, 39, 0.72) 13%, rgba(111, 187, 46, 0.55) 26%, rgba(52, 156, 49, 0.12) 44%, rgba(23, 118, 40, 0) 58%),
          linear-gradient(180deg, #1d972f 0%, #28942d 18%, #2c8d28 46%, #1b7a27 72%, #136522 100%);
        box-shadow:
          inset 0 0 0 3px rgba(30, 83, 22, 0.35),
          inset 0 -18px 40px rgba(12, 52, 16, 0.26),
          0 30px 70px rgba(0, 0, 0, 0.38);
      }

      #appShell::before,
      #appShell::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      #appShell::before {
        background:
          radial-gradient(circle at 22% 18%, rgba(255,255,255,0.12), transparent 18%),
          radial-gradient(circle at 82% 78%, rgba(255,255,255,0.08), transparent 22%),
          radial-gradient(circle at 56% 82%, rgba(0,0,0,0.12), transparent 28%),
          repeating-linear-gradient(135deg, rgba(255,255,255,0.02) 0 3px, rgba(0,0,0,0.015) 3px 6px);
        mix-blend-mode: soft-light;
        opacity: 0.45;
      }

      #appShell::after {
        box-shadow: inset 0 0 120px rgba(0, 0, 0, 0.12);
      }

      .title {
        position: absolute;
        top: 4.2%;
        left: 50%;
        margin: 0;
        transform: translateX(-50%);
        font-family: "Big Bloke BB", Impact, Haettenschweiler, "Arial Black", sans-serif;
        font-size: clamp(42px, 5vw, 78px);
        line-height: 0.92;
        letter-spacing: 0.6px;
        white-space: nowrap;
        color: #f5e338;
        text-shadow:
          -1px -1px 0 var(--bb-outline),
          1px -1px 0 var(--bb-outline),
          -1px 1px 0 var(--bb-outline),
          1px 1px 0 var(--bb-outline),
          0 3px 0 var(--bb-outline-deep),
          0 6px 9px rgba(0, 0, 0, 0.16);
        z-index: 3;
      }

      .title::before,
      .title::after {
        display: none;
      }

      #categoryNav {
        position: absolute;
        left: 2.3%;
        top: 18.2%;
        width: 13.8%;
        display: grid;
        gap: clamp(8px, 1vw, 14px);
        z-index: 3;
      }

      .category-btn {
        appearance: none;
        border: 0;
        background: transparent;
        padding: 0;
        text-align: left;
        cursor: pointer;
        font-family: "Big Bloke BB", Impact, Haettenschweiler, "Arial Black", sans-serif;
        font-size: clamp(21px, 2.2vw, 35px);
        line-height: 0.92;
        text-transform: uppercase;
        color: #f5e338;
        text-shadow:
          -1px -1px 0 var(--bb-outline),
          1px -1px 0 var(--bb-outline),
          -1px 1px 0 var(--bb-outline),
          1px 1px 0 var(--bb-outline),
          0 3px 0 var(--bb-outline-deep),
          0 6px 9px rgba(0, 0, 0, 0.16);
        transition: transform 120ms ease, filter 120ms ease;
      }

      .category-btn:hover,
      .category-btn.is-active {
        transform: translateX(8px);
        filter: brightness(1.08);
      }

      #randomizeBtn,
      #defEditorBtn {
        margin-top: clamp(8px, 1vw, 14px);
        white-space: normal;
      }

      #selectorPanel {
        position: absolute;
        left: 16.4%;
        top: 19.1%;
        width: 39.7%;
        height: 58.4%;
        display: grid;
        grid-auto-rows: max-content;
        gap: 8px;
        align-content: start;
        border-radius: 18px;
        background: linear-gradient(180deg, #efefef 0%, #dedede 32%, #cccccc 100%);
        border: 3px solid #a3a3a3;
        box-shadow:
          inset 0 2px 0 rgba(255,255,255,0.9),
          inset 0 -12px 14px rgba(116,116,116,0.18),
          0 0 0 2px rgba(246,246,246,0.85),
          0 6px 0 #29358f,
          0 12px 20px rgba(0, 0, 0, 0.22);
        padding: 5.2% 6.2% 4.8%;
        z-index: 3;
      }

      #selectorPanel::after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        bottom: -7px;
        height: 12px;
        border-radius: 0 0 16px 16px;
        background: linear-gradient(180deg, #27338f 0%, #171f65 100%);
        z-index: -1;
      }

      #typeGrid {
        order: 2;
        --type-cols: 4;
        --type-rows: 1;
        --type-row-height: clamp(62px, 5vw, 74px);
        --type-gap-x: 12px;
        --type-gap-y: 10px;
        min-height: calc(var(--type-rows) * var(--type-row-height) + (var(--type-rows) - 1) * var(--type-gap-y));
        display: grid;
        grid-template-columns: repeat(var(--type-cols), minmax(0, 1fr));
        grid-auto-rows: var(--type-row-height);
        gap: var(--type-gap-y) var(--type-gap-x);
        align-items: stretch;
        padding: 0 1%;
      }

      #typeGrid.layout-head,
      #typeGrid.layout-body {
        --type-cols: 4;
        --type-rows: 1;
        --type-row-height: clamp(62px, 5vw, 74px);
      }

      #typeGrid.layout-eyes {
        --type-cols: 6;
        --type-rows: 1;
        --type-row-height: clamp(40px, 3.2vw, 48px);
        --type-gap-x: 8px;
        --type-gap-y: 8px;
      }

      #typeGrid.layout-antenna {
        --type-cols: 6;
        --type-rows: 2;
        --type-row-height: clamp(38px, 2.9vw, 44px);
        --type-gap-x: 8px;
        --type-gap-y: 6px;
      }

      #typeGrid.layout-legs {
        --type-cols: 5;
        --type-rows: 2;
        --type-row-height: clamp(38px, 2.9vw, 44px);
      #typeGrid.layout-hats {
        --type-cols: 2;
        --type-rows: 1;
        --type-row-height: clamp(58px, 4.4vw, 68px);
        --type-gap-x: 14px;
      }

        --type-gap-x: 8px;
        --type-gap-y: 6px;
      }

      .type-btn {
        height: 100%;
        min-height: 0;
        display: grid;
        place-items: center;
        align-self: stretch;
        border-radius: 14px;
        border: 3px solid transparent;
        background: transparent;
        cursor: pointer;
        box-shadow: none;
        overflow: hidden;
        transition: transform 120ms ease, filter 120ms ease;
      }

      .type-btn:hover {
        transform: translateY(-2px);
        filter: brightness(1.03);
      }

      .type-btn svg {
        width: 88%;
        height: 88%;
        display: block;
        overflow: hidden;
        filter: drop-shadow(0 2px 0 rgba(255,255,255,0.45));
      }

      #typeGrid.layout-eyes .type-btn svg {
        width: 94%;
        height: 76%;
      }

      #typeGrid.layout-antenna .type-btn svg,
      #typeGrid.layout-legs .type-btn svg {
        width: 84%;
        height: 78%;
      }

      .type-btn.is-active {
        border-color: #27319f;
        background: rgba(53, 78, 188, 0.08);
        box-shadow: inset 0 2px 0 rgba(255,255,255,0.55), 0 0 0 2px rgba(255,255,255,0.72);
      }

      #colorTools {
        order: 3;
        width: min(100%, 290px);
        justify-self: center;
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        grid-template-areas:
          "label label"
          "text apply";
        align-items: center;
        gap: 6px 8px;
        padding: 0;
        min-height: 0;
      }

      #hexPickerLabel {
        grid-area: label;
        justify-self: start;
        margin-left: 2px;
        font-family: "GosmickSans", Arial, sans-serif;
        font-size: clamp(12px, 0.95vw, 15px);
        font-weight: 700;
        color: rgba(78, 78, 78, 0.8);
        white-space: nowrap;
      }

      #hexColorText {
        grid-area: text;
        width: 100%;
        min-width: 0;
        max-width: 100%;
        padding: 8px 10px;
        border-radius: 10px;
        border: 2px solid #a9a9a9;
        background: #fbfbfb;
        font-family: "GosmickSans", Arial, sans-serif;
        font-size: clamp(13px, 1vw, 16px);
        font-weight: 700;
        text-transform: uppercase;
        color: #4c4c4c;
      }

      #applyHexBtn {
        grid-area: apply;
        justify-self: end;
        min-width: clamp(52px, 4vw, 64px);
        padding: 8px 10px 9px;
        border: 0;
        border-radius: 11px;
        cursor: pointer;
        background: linear-gradient(180deg, #1841fe 0%, #102fdc 44%, #0b1ca6 100%);
        box-shadow:
          inset 0 2px 0 rgba(255,255,255,0.22),
          inset 0 -2px 0 rgba(0,0,0,0.18),
          0 3px 0 #0d0c73,
          0 7px 12px rgba(0,0,0,0.2);
        font-family: "Big Bloke BB", Impact, Haettenschweiler, "Arial Black", sans-serif;
        font-size: clamp(16px, 1.25vw, 20px);
        line-height: 0.9;
        color: #f5e338;
        text-shadow:
          -1px -1px 0 var(--bb-outline),
          1px -1px 0 var(--bb-outline),
          -1px 1px 0 var(--bb-outline),
          1px 1px 0 var(--bb-outline),
          0 2px 0 var(--bb-outline-deep);
      }

      #paletteGrid {
        order: 2;
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        align-content: start;
        gap: 8px 10px;
        padding: 0 4% 2px;
      }

      .swatch-btn {
        position: relative;
        width: clamp(26px, 3.1vw, 42px);
        height: clamp(20px, 2.25vw, 27px);
        justify-self: center;
        border: 0;
        padding: 0;
        cursor: pointer;
        background: transparent;
        transition: transform 120ms ease;
      }

      .swatch-btn:hover {
        transform: translateY(-2px) scale(1.03);
      }

      .swatch-btn::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 55% 48% 52% 42% / 56% 43% 61% 46%;
        background:
          radial-gradient(circle at 36% 28%, rgba(255,255,255,0.28) 0 22%, transparent 24%),
          linear-gradient(180deg, rgba(255,255,255,0.1), rgba(0,0,0,0.12)),
          var(--swatch);
        box-shadow:
          inset 0 1px 0 rgba(255,255,255,0.35),
          inset 0 -3px 0 rgba(0,0,0,0.18),
          0 1px 0 rgba(255,255,255,0.35),
          0 2px 2px rgba(0,0,0,0.18);
      }

      .swatch-btn.is-active::after {
        content: "";
        position: absolute;
        inset: -4px;
        border-radius: 55% 48% 52% 42% / 56% 43% 61% 46%;
        border: 3px solid #ffffff;
        box-shadow: 0 0 0 2px #27319f;
      }

      #defEditor {
        order: 2;
        display: grid;
        gap: 12px;
        align-content: start;
        padding: 4% 4% 0;
      }

      #defEditor[hidden] {
        display: none;
      }

      #defEditor label {
        font-size: clamp(12px, 1vw, 16px);
        font-weight: 700;
        font-style: italic;
        text-align: center;
        color: rgba(78, 78, 78, 0.78);
      }

      #defInput {
        width: 100%;
        padding: 13px 14px;
        border-radius: 12px;
        border: 2px solid #a9a9a9;
        background: #fbfbfb;
        font-family: "GosmickSans", Arial, sans-serif;
        font-size: clamp(15px, 1.15vw, 18px);
        font-weight: 700;
        letter-spacing: 0.6px;
        color: #3f3f3f;
      }

      .def-editor-actions {
        display: flex;
        justify-content: center;
      }

      #applyDefBtn {
        min-width: clamp(120px, 12vw, 170px);
        padding: 10px 18px 12px;
        border: 0;
        border-radius: 12px;
        cursor: pointer;
        background: linear-gradient(180deg, #1841fe 0%, #102fdc 44%, #0b1ca6 100%);
        box-shadow:
          inset 0 2px 0 rgba(255,255,255,0.22),
          inset 0 -2px 0 rgba(0,0,0,0.18),
          0 4px 0 #0d0c73,
          0 8px 12px rgba(0,0,0,0.22);
        font-family: "Big Bloke BB", Impact, Haettenschweiler, "Arial Black", sans-serif;
        font-size: clamp(26px, 2.2vw, 34px);
        line-height: 0.9;
        color: #f5e338;
        text-shadow:
          -1px -1px 0 var(--bb-outline),
          1px -1px 0 var(--bb-outline),
          -1px 1px 0 var(--bb-outline),
          1px 1px 0 var(--bb-outline),
          0 3px 0 var(--bb-outline-deep);
      }

      #selectorPanel.is-def-mode #typeGrid,
      #selectorPanel.is-def-mode #colorTools,
      #selectorPanel.is-def-mode #paletteGrid {
        display: none;
      }

      #selectorPanel.is-def-mode {
        gap: 14px;
        align-content: center;
      }

      #panelHint {
        display: none;
      }

      #noteBlock {
        position: absolute;
        left: 2.8%;
        bottom: 10.1%;
        width: 45.2%;
        margin: 0;
        z-index: 3;
        font-family: "GosmickSans", "Comic Sans MS", "Trebuchet MS", cursive, sans-serif;
        font-size: clamp(16px, 1.8vw, 28px);
        line-height: 1.08;
        color: #fff7ef;
        text-shadow: 0 2px 4px rgba(0,0,0,0.34);
      }

      #stageArea {
        position: absolute;
        right: 5%;
        top: 17.8%;
        width: 33.5%;
        height: 58.5%;
        z-index: 3;
      }

      #viewer {
        position: absolute;
        inset: 0 0 21% 0;
      }

      #viewer canvas {
        width: 100%;
        height: 100%;
        display: block;
      }

      #spinControls {
        position: absolute;
        left: 51%;
        bottom: 14%;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .spin-btn {
        position: relative;
        width: clamp(48px, 5vw, 72px);
        height: clamp(34px, 4vw, 54px);
        border: 0;
        padding: 0;
        cursor: pointer;
        color: transparent;
        background: linear-gradient(180deg, #ffe35b 0%, #f0c816 58%, #d8aa07 100%);
        box-shadow:
          inset 0 2px 0 rgba(255,255,255,0.35),
          0 4px 0 #8a740b,
          0 8px 12px rgba(0,0,0,0.2);
      }

      #spinLeft {
        clip-path: polygon(100% 10%, 38% 10%, 38% 0, 0 50%, 38% 100%, 38% 90%, 100% 90%);
      }

      #spinRight {
        clip-path: polygon(0 10%, 62% 10%, 62% 0, 100% 50%, 62% 100%, 62% 90%, 0 90%);
      }

      #spinLabel {
        font-family: "Big Bloke BB", Impact, Haettenschweiler, "Arial Black", sans-serif;
        font-size: clamp(20px, 2.1vw, 30px);
        color: #f5e338;
        text-shadow:
          -1px -1px 0 var(--bb-outline),
          1px -1px 0 var(--bb-outline),
          -1px 1px 0 var(--bb-outline),
          1px 1px 0 var(--bb-outline),
          0 3px 0 var(--bb-outline-deep);
      }

      #signupCta {
        position: absolute;
        left: 50%;
        bottom: 0.2%;
        transform: translateX(-50%);
        min-width: 59%;
        border: 0;
        cursor: pointer;
        padding: 12px 26px 14px;
        border-radius: 14px;
        background: linear-gradient(180deg, #1841fe 0%, #102fdc 44%, #0b1ca6 100%);
        box-shadow:
          inset 0 3px 0 rgba(255,255,255,0.22),
          inset 0 -2px 0 rgba(0,0,0,0.18),
          0 5px 0 #0d0c73,
          0 12px 16px rgba(0,0,0,0.24);
        font-family: "Big Bloke BB", Impact, Haettenschweiler, "Arial Black", sans-serif;
        font-size: clamp(28px, 3vw, 46px);
        line-height: 0.9;
        color: #f5e338;
        text-shadow:
          -1px -1px 0 var(--bb-outline),
          1px -1px 0 var(--bb-outline),
          -1px 1px 0 var(--bb-outline),
          1px 1px 0 var(--bb-outline),
          0 3px 0 var(--bb-outline-deep),
          0 6px 9px rgba(0, 0, 0, 0.16);
      }

      #signupCta.is-save-mode {
        width: 46%;
        min-width: 0;
        bottom: 0.8%;
        padding: 10px 16px 11px;
        font-size: clamp(22px, 2.45vw, 34px);
        line-height: 0.82;
      }

      #statusBar {
        position: absolute;
        left: 16.9%;
        bottom: 4.1%;
        max-width: 36.5%;
        min-height: 18px;
        font-family: "GosmickSans", Arial, sans-serif;
        font-size: clamp(12px, 1.12vw, 17px);
        color: rgba(255,255,255,0.94);
        text-shadow: 0 2px 4px rgba(0,0,0,0.36);
        z-index: 3;
      }

      #signupModal {
        position: absolute;
        inset: 0;
        display: none;
        place-items: center;
        z-index: 20;
        background: rgba(11, 44, 16, 0.56);
        backdrop-filter: blur(6px);
      }

      #signupModal.is-open {
        display: grid;
      }

      .modal-card {
        width: min(92%, 450px);
        padding: 24px 22px 18px;
        border-radius: 20px;
        background: linear-gradient(180deg, #f4f4f4, #d8d8d8);
        border: 3px solid #9f9f9f;
        box-shadow:
          inset 0 2px 0 rgba(255,255,255,0.85),
          0 7px 0 #29358f,
          0 20px 36px rgba(0,0,0,0.32);
      }

      .modal-card h2 {
        margin: 0 0 8px;
        font-family: "Big Bloke BB", Impact, Haettenschweiler, "Arial Black", sans-serif;
        font-size: 40px;
        line-height: 0.95;
        color: #f5e338;
        text-shadow:
          -1px -1px 0 var(--bb-outline),
          1px -1px 0 var(--bb-outline),
          -1px 1px 0 var(--bb-outline),
          1px 1px 0 var(--bb-outline),
          0 3px 0 var(--bb-outline-deep);
      }

      .modal-card p {
        margin: 0 0 16px;
        color: #3d3d3d;
        line-height: 1.35;
        font-family: "GosmickSans", Arial, sans-serif;
      }

      .field {
        display: grid;
        gap: 6px;
        margin-bottom: 12px;
      }

      .field label {
        font-weight: 700;
        color: #505050;
      }

      .field input {
        width: 100%;
        padding: 11px 12px;
        border-radius: 12px;
        border: 2px solid #b5b5b5;
        background: #fff;
        font-size: 16px;
        font-family: "GosmickSans", Arial, sans-serif;
      }

      .look-code {
        margin: 14px 0 16px;
        padding: 10px 12px;
        border-radius: 12px;
        background: rgba(48, 87, 194, 0.08);
        border: 2px dashed rgba(48, 87, 194, 0.28);
        font-size: 14px;
        color: #2a3974;
        word-break: break-all;
      }

      .modal-actions {
        display: flex;
        gap: 10px;
      }

      .modal-actions button {
        flex: 1;
        padding: 12px 14px;
        border: 0;
        border-radius: 12px;
        cursor: pointer;
        font-weight: 800;
        font-size: 16px;
        font-family: "GosmickSans", Arial, sans-serif;
      }

      #confirmSignup {
        background: linear-gradient(180deg, #173ffc, #0d1fa8);
        color: #fff4a6;
      }

      #closeSignup {
        background: #efefef;
        color: #4a4a4a;
      }

      @media (max-width: 920px) {
        body {
          overflow: auto;
          display: block;
        }

        #appShell {
          width: 100vw;
          min-height: 100vh;
          aspect-ratio: auto;
        }
      }
    </style>
  </head>
  <body>
    <main id="appShell">
      <h1 class="title" data-text="Design Your Weevil">Design Your Weevil</h1>

      <nav id="categoryNav" aria-label="Weevil customisation categories">
        <button class="category-btn" data-category="head">Head</button>
        <button class="category-btn" data-category="body">Body</button>
        <button class="category-btn" data-category="eyes">Eyes</button>
        <button class="category-btn" data-category="antenna">Antenna</button>
        <button class="category-btn" data-category="hats">Hats</button>
        <button class="category-btn" data-category="legs">Legs</button>
        <button class="category-btn" id="randomizeBtn" type="button">Random</button>
        <button class="category-btn" id="defEditorBtn" type="button">Apply Def</button>
      </nav>

      <section id="selectorPanel" aria-live="polite">
        <div id="typeGrid"></div>
        <div id="colorTools">
          <label id="hexPickerLabel" for="hexColorText">Hex colour code</label>
          <input id="hexColorText" type="text" maxlength="7" spellcheck="false" value="#AAFF00" placeholder="#A1B2C3" aria-label="Hex colour code" />
          <button id="applyHexBtn" type="button">Set</button>
        </div>
        <div id="paletteGrid"></div>
        <div id="defEditor" hidden>
          <label for="defInput">Paste a valid weevil def</label>
          <input id="defInput" type="text" inputmode="numeric" maxlength="18" placeholder="100100100040000000" />
          <div class="def-editor-actions">
            <button id="applyDefBtn" type="button">Apply</button>
          </div>
        </div>
        <p id="panelHint" aria-hidden="true"></p>
      </section>

      <p id="noteBlock">
        Every Bin Weevil is unique. When you are happy with your look, create your account and save your weevil.
      </p>

      <section id="stageArea" aria-label="Weevil preview area">
        <div id="viewer"><canvas id="weevilCanvas"></canvas></div>
        <div id="spinControls">
          <button id="spinLeft" class="spin-btn" aria-label="Spin left">◀</button>
          <div id="spinLabel">SPIN</div>
          <button id="spinRight" class="spin-btn" aria-label="Spin right">▶</button>
        </div>
        <button id="signupCta">SIGN UP</button>
      </section>

      <div id="statusBar"></div>

      <section id="signupModal" aria-hidden="true">
        <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="signupTitle">
          <h2 id="signupTitle">Sign Up</h2>
          <p>Choose a weevil name, add your account details and save this weevil to your new profile.</p>

          <div class="field">
            <label for="signupName">Weevil name</label>
            <input id="signupName" type="text" placeholder="Captain Curlylegs" />
          </div>

          <div class="field">
            <label for="signupEmail">Email</label>
            <input id="signupEmail" type="email" placeholder="name@example.com" />
          </div>

          <div class="field">
            <label for="signupPassword">Password</label>
            <input id="signupPassword" type="password" placeholder="Create a password" />
          </div>

          <div class="look-code">
            <strong>Weevil def:</strong>
            <span id="lookCode"></span>
          </div>

          <div class="modal-actions">
            <button id="closeSignup" type="button">Close</button>
            <button id="confirmSignup" type="button">Create account</button>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
